class SubActivity2 : AppCompatActivity() {
    companion object {
        val EXTRA_STRING = "EXTRA_STRING"
        val EXTRA_PARCEL = "EXTRA_PARCEL"
    }

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_sub2)

        var tvData : TextView = findViewById(R.id.tvData)

        var strData = intent.getStringExtra(EXTRA_STRING)
        var obj = intent.getParcelableExtra<Mahasiswa>(EXTRA_PARCEL)

        var text = ""
        if (!strData.isNullOrBlank()) {
            text = strData
        } else if (!obj!!.nim.isNullOrBlank()) {
            text = "NIM: \${'$'}{obj.nim}, Nama: \${'$'}{obj.nama}"
        } else {
            text = "Tidak ada data!"
        }

        tvData.setText(text)

    <string-array name="data_description">
        <item>Salah seorang ulama dan khatib terkemuka di Masjid Besar Kasultanan Yogyakarta
            pada masa itu. KH. Ahmad Dahlan telah mempelopori kebangkitan ummat Islam untuk
            menyadari nasibnya sebagai bangsa terjajah yang masih harus belajar dan berbuat.</item>
        <item>Jenderal TNI Anumerta Ahmad Yani (lahir di Purworejo, 19 Juni 1922 – meninggal
            di Lubang Buaya, 1 Oktober 1965) adalah komandan Tentara Nasional Indonesia
            Angkatan Darat, dibunuh oleh anggota Gerakan 30 September.</item>
        <item>Sutomo (lahir di Surabaya, 3 Oktober 1920 – meninggal 7 Oktober 1981) lebih
            dikenal sebagai Bung Tomo, pahlawan yang terkenal karena peranannya membangkitkan
            semangat rakyat melawan penjajah Belanda, berakhir dengan pertempuran 10 November 1945.</item>
        <item>Jenderal TNI (Purn.) Gatot Soebroto (lahir di Sumpiuh, 10 Oktober 1907 – meninggal
            di Jakarta, 11 Juni 1962) adalah tokoh perjuangan militer Indonesia dalam merebut
            kemerdekaan dan pahlawan nasional Indonesia.</item>
        <item>Raden Mas Soewardi Soerjaningrat, sejak 1922 menjadi Ki Hadjar Dewantara
            (lahir di Pakualaman, 2 Mei 1889 – meninggal di Yogyakarta, 26 April 1959)
            adalah aktivis pergerakan kemerdekaan Indonesia dan pendiri Perguruan Taman Siswa.</item>
        <item>Dr.(HC) Drs. H. Mohammad Hatta, dikenal sebagai Bung Hatta (lahir di Bukittinggi,
            12 Agustus 1902 – meninggal di Jakarta, 14 Maret 1980) adalah tokoh pejuang,
            negarawan, ekonom, dan Wakil Presiden Indonesia yang pertama.</item>
        <item>Jenderal Besar Raden Soedirman (lahir 24 Januari 1916 – meninggal 29 Januari 1950)
            adalah seorang perwira tinggi Indonesia pada masa Revolusi Nasional Indonesia dan
            menjadi panglima besar Tentara Nasional Indonesia pertama.</item>
        <item>Dr.(H.C.) Ir. H. Soekarno (lahir di Surabaya, 6 Juni 1901 – meninggal di Jakarta,
            21 Juni 1970) adalah Presiden pertama Republik Indonesia yang menjabat pada periode
            1945–1967 dan Proklamator Kemerdekaan Indonesia.</item>
        <item>Prof. Mr. Dr. Soepomo (lahir di Sukoharjo, 22 Januari 1903 – meninggal di Jakarta,
            12 September 1958) adalah seorang pahlawan nasional Indonesia, dikenal sebagai
            arsitek Undang-undang Dasar 1945.</item>
        <item>Tan Malaka atau Ibrahim gelar Datuk Sutan Malaka (lahir 2 Juni 1897 – meninggal
            21 Februari 1949) adalah seorang pembela kemerdekaan Indonesia, tokoh Partai Komunis
            Indonesia, dan pendiri Partai Murba.</item>

import android.view.View
import android.view.ViewGroup
import android.widget.ImageView
import android.widget.TextView
import android.widget.Toast
import androidx.recyclerview.widget.RecyclerView
import com.bumptech.glide.Glide
import com.bumptech.glide.request.RequestOptions

class ListHeroAdapter(private val listHero: ArrayList<Hero>)
    : RecyclerView.Adapter<ListHeroAdapter.ListViewHolder>() {

    // binding ke item_row_hero.xml
    class ListViewHolder(itemView: View) : RecyclerView.ViewHolder(itemView) {
        var imgPhoto: ImageView = itemView.findViewById(R.id.img_item_photo)
        var tvName: TextView = itemView.findViewById(R.id.tv_item_name)
        var tvDescription: TextView = itemView.findViewById(R.id.tv_item_description)
    }

    override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): ListViewHolder {
        val view: View = LayoutInflater.from(parent.context).inflate(
            R.layout.item_row_hero,
            parent,
            false
        )
        return ListViewHolder(view)
    }

    override fun onBindViewHolder(holder: ListViewHolder, position: Int) {
        val (name, description, photo) = listHero[position]

        holder.tvName.text = name
        holder.tvDescription.text = description

        // load dan tampilkan photo dengan Glide
        Glide.with(holder.itemView.context)
            .load(photo)
            .apply(RequestOptions().override(55, 55))
            .into(holder.imgPhoto)

        // set event saat item di klik
        holder.itemView.setOnClickListener {
            Toast.makeText(
                holder.itemView.context,
                "Kamu memilih " + listHero[holder.adapterPosition].name,
                Toast.LENGTH_SHORT
            ).show()
        }
    }

    // jumlah item
    override fun getItemCount(): Int = listHero.size

import androidx.appcompat.app.AppCompatActivity
import androidx.recyclerview.widget.LinearLayoutManager
import psti.unram.latihanrecyclerview.databinding.ActivityMainBinding

class MainActivity : AppCompatActivity() {
    private lateinit var binding: ActivityMainBinding
    private val list = ArrayList<Hero>()

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        binding = ActivityMainBinding.inflate(layoutInflater)
        setContentView(binding.root)

        binding.rvHeroes.setHasFixedSize(true)
        list.addAll(getListHeroes())
        binding.rvHeroes.layoutManager = LinearLayoutManager(this)
        binding.rvHeroes.adapter = ListHeroAdapter(list)
    }

    private fun getListHeroes(): ArrayList<Hero> {
        val dataName = resources.getStringArray(R.array.data_name)
        val dataDescription = resources.getStringArray(R.array.data_description)
        val dataPhoto = resources.getStringArray(R.array.data_photo)

        val listHero = ArrayList<Hero>()
        for (i in dataName.indices) {
            val hero = Hero(dataName[i], dataDescription[i], dataPhoto[i])
            listHero.add(hero)
        }
        return listHero
    }

    private lateinit var binding: ActivityRegisterBinding
    private lateinit var auth: FirebaseAuth
    private lateinit var db: FirebaseFirestore

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        binding = ActivityRegisterBinding.inflate(layoutInflater)

        db = FirebaseFirestore.getInstance()

                        val uid = auth.currentUser?.uid ?: return@addOnCompleteListener

                        // Simpan data user ke Firestore
                        val userData = hashMapOf(
                            "nama" to nama,
                            "email" to email
                        )
                        db.collection("users").document(uid)
                            .set(userData)

                                Toast.makeText(this, "Registrasi berhasil!", Toast.LENGTH_SHORT).show()

                        Toast.makeText(
                            this,
                            "Gagal: \${task.exception?.message}",
                            Toast.LENGTH_LONG
                        ).show()
                    }
                }
        }

        // Navigasi ke LoginActivity
        binding.tvToLogin.setOnClickListener {
            finish() // kembali ke LoginActivity
        }
    }

import android.os.Bundle
import android.widget.Toast
import androidx.activity.result.contract.ActivityResultContracts
import androidx.appcompat.app.AppCompatActivity
import com.google.android.gms.auth.api.signin.GoogleSignIn
import com.google.android.gms.auth.api.signin.GoogleSignInClient
import com.google.android.gms.auth.api.signin.GoogleSignInOptions
import com.google.android.gms.common.api.ApiException
import com.google.firebase.auth.FirebaseAuth
import com.google.firebase.auth.GoogleAuthProvider
import pb.psti.catatanapp.databinding.ActivityLoginBinding

class LoginActivity : AppCompatActivity() {

    private lateinit var binding: ActivityLoginBinding
    private lateinit var auth: FirebaseAuth
    private lateinit var googleSignInClient: GoogleSignInClient

    // Launcher untuk Google Sign-In
    private val googleSignInLauncher = registerForActivityResult(
        ActivityResultContracts.StartActivityForResult()
    ) { result ->
        val task = GoogleSignIn.getSignedInAccountFromIntent(result.data)
        try {
            val account = task.getResult(ApiException::class.java)
            firebaseAuthWithGoogle(account.idToken!!)
        } catch (e: ApiException) {
            Toast.makeText(this, "Google Sign-In gagal: \${e.message}", Toast.LENGTH_SHORT).show()
        }
    }

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        binding = ActivityLoginBinding.inflate(layoutInflater)
        setContentView(binding.root)

        auth = FirebaseAuth.getInstance()

        // Setup Google Sign-In
        val gso = GoogleSignInOptions.Builder(GoogleSignInOptions.DEFAULT_SIGN_IN)
            .requestIdToken(getString(R.string.default_web_client_id))
            .requestEmail()
            .build()
        googleSignInClient = GoogleSignIn.getClient(this, gso)

        // Login dengan Email & Password
        binding.btnLogin.setOnClickListener {
            val email = binding.etEmail.text.toString().trim()
            val password = binding.etPassword.text.toString().trim()

            if (email.isBlank() || password.isBlank()) {
                Toast.makeText(this, "Email dan password harus diisi", Toast.LENGTH_SHORT).show()
                return@setOnClickListener
            }

            auth.signInWithEmailAndPassword(email, password)
                .addOnCompleteListener(this) { task ->
                    if (task.isSuccessful) {
                        goToMain()
                    } else {
                        Toast.makeText(
                            this,
                            "Login gagal: \${task.exception?.message}",
                            Toast.LENGTH_LONG
                        ).show()
                    }
                }
        }

        // Login dengan Google
        binding.btnGoogle.setOnClickListener {
            val signInIntent = googleSignInClient.signInIntent
            googleSignInLauncher.launch(signInIntent)
        }

        // Navigasi ke RegisterActivity
        binding.tvToRegister.setOnClickListener {
            startActivity(Intent(this, RegisterActivity::class.java))
        }
    }

    // Cek jika sudah login, langsung ke MainActivity
    override fun onStart() {
        super.onStart()
        if (auth.currentUser != null) {
            goToMain()
        }
    }

    private fun firebaseAuthWithGoogle(idToken: String) {
        val credential = GoogleAuthProvider.getCredential(idToken, null)
        auth.signInWithCredential(credential)
            .addOnCompleteListener(this) { task ->
                if (task.isSuccessful) {
                    goToMain()
                } else {
                    Toast.makeText(
                        this,
                        "Autentikasi gagal: \${task.exception?.message}",
                        Toast.LENGTH_LONG
                    ).show()
                }
            }
    }

    private fun goToMain() {
        startActivity(Intent(this, MainActivity::class.java))
        finish() // finish agar tidak bisa back ke LoginActivity
    }
}`}),a.jsxs("div",{className:"note-box",children:[a.jsx("strong",{children:"💡 registerForActivityResult vs onActivityResult"}),a.jsxs("p",{style:{marginTop:"10px"},children:["Kode di atas menggunakan ",a.jsx("span",{className:"highlight-code",children:"registerForActivityResult()"}),"yang merupakan cara modern (Activity Result API) pengganti"," ",a.jsx("span",{className:"highlight-code",children:"onActivityResult()"})," yang sudah deprecated."]})]}),a.jsx("h3",{children:"Kesimpulan Section Login"}),a.jsxs("div",{className:"success-box",children:[a.jsx("strong",{children:"✅ Yang Telah Dipelajari:"}),a.jsxs("ul",{className:"list-styled",children:[a.jsx("li",{children:"Mengecek status login di onStart() dengan auth.currentUser"}),a.jsx("li",{children:"Login dengan signInWithEmailAndPassword()"}),a.jsx("li",{children:"Konfigurasi GoogleSignInOptions dengan requestIdToken()"}),a.jsx("li",{children:"Memulai Google Sign-In flow dengan Activity Result API"}),a.jsx("li",{children:"Autentikasi ke Firebase dengan signInWithCredential()"}),a.jsx("li",{children:"Menggunakan finish() agar LoginActivity tidak bisa di-back"})]})]})]}),Xx=()=>a.jsxs("div",{className:"content-section",children:[a.jsx("h2",{children:"⚙️ Manajemen User & Session Login"}),a.jsx("p",{children:"Setelah login berhasil, kita perlu mengambil data user yang sedang login dan menampilkannya di MainActivity. Firebase Auth menyimpan session login secara otomatis — user tetap login meskipun aplikasi ditutup."}),a.jsx("h3",{children:"Langkah 1: Mengambil Data User yang Login"}),a.jsx(j,{title:"📌 FirebaseUser Properties",defaultOpen:!0,children:a.jsxs("div",{className:"note-box",children:[a.jsx("strong",{children:"auth.currentUser"}),a.jsxs("p",{style:{marginTop:"10px"},children:["Mengembalikan objek ",a.jsx("span",{className:"highlight-code",children:"FirebaseUser"})," jika ada user yang sedang login, atau null jika tidak ada."]}),a.jsxs("ul",{className:"list-styled",style:{marginTop:"10px"},children:[a.jsxs("li",{ import android.os.Bundle
import android.widget.Toast
import androidx.appcompat.app.AppCompatActivity
import androidx.recyclerview.widget.LinearLayoutManager
import com.google.firebase.auth.FirebaseAuth
import com.google.firebase.firestore.FirebaseFirestore
import pb.psti.catatanapp.databinding.ActivityMainBinding

class MainActivity : AppCompatActivity() {

    private lateinit var binding: ActivityMainBinding
    private lateinit var auth: FirebaseAuth
    private lateinit var db: FirebaseFirestore
    private val notesList = mutableListOf<Note>()
    private lateinit var noteAdapter: NoteAdapter

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        binding = ActivityMainBinding.inflate(layoutInflater)
        setContentView(binding.root)

        auth = FirebaseAuth.getInstance()
        db = FirebaseFirestore.getInstance()

        // Pastikan user sudah login
        val currentUser = auth.currentUser
        if (currentUser == null) {
            goToLogin()
            return
        }

        // Setup RecyclerView
        noteAdapter = NoteAdapter(notesList)
        binding.rvNotes.layoutManager = LinearLayoutManager(this)
        binding.rvNotes.adapter = noteAdapter

        // Tampilkan data user
        tampilkanDataUser(currentUser.uid)

        // Load catatan
        loadNotes(currentUser.uid)

        // Simpan catatan baru
        binding.btnSimpan.setOnClickListener {
            val isi = binding.etCatatan.text.toString().trim()
            if (isi.isBlank()) {
                Toast.makeText(this, "Catatan tidak boleh kosong", Toast.LENGTH_SHORT).show()
                return@setOnClickListener
            }
            simpanCatatan(currentUser.uid, isi)
        }

        // Logout
        binding.btnLogout.setOnClickListener {
            auth.signOut()
            goToLogin()
        }
    }

    private fun tampilkanDataUser(uid: String) {
        // Coba ambil nama dari Firestore
        db.collection("users").document(uid).get()
            .addOnSuccessListener { document ->
                val nama = document.getString("nama") ?: auth.currentUser?.displayName ?: "User"
                val email = auth.currentUser?.email ?: ""
                binding.tvWelcome.text = "Selamat datang, $nama!"
                binding.tvEmail.text = email
            }
    }

    private fun goToLogin() {
        startActivity(Intent(this, LoginActivity::class.java))

import android.widget.Toast
import androidx.appcompat.app.AppCompatActivity
import androidx.recyclerview.widget.LinearLayoutManager
import com.google.firebase.auth.FirebaseAuth
import com.google.firebase.firestore.FirebaseFirestore
import pb.psti.catatanapp.databinding.ActivityMainBinding

class MainActivity : AppCompatActivity() {

    private lateinit var binding: ActivityMainBinding
    private lateinit var auth: FirebaseAuth
    private lateinit var db: FirebaseFirestore
    private val notesList = mutableListOf<Note>()
    private lateinit var noteAdapter: NoteAdapter

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        binding = ActivityMainBinding.inflate(layoutInflater)
        setContentView(binding.root)

        auth = FirebaseAuth.getInstance()
        db = FirebaseFirestore.getInstance()

        val currentUser = auth.currentUser
        if (currentUser == null) {
            goToLogin()
            return
        }

        noteAdapter = NoteAdapter(notesList)
        binding.rvNotes.layoutManager = LinearLayoutManager(this)
        binding.rvNotes.adapter = noteAdapter

        tampilkanDataUser(currentUser.uid)
        loadNotes(currentUser.uid)

        binding.btnSimpan.setOnClickListener {
            val isi = binding.etCatatan.text.toString().trim()
            if (isi.isBlank()) {
                Toast.makeText(this, "Catatan tidak boleh kosong", Toast.LENGTH_SHORT).show()
                return@setOnClickListener
            }
            simpanCatatan(currentUser.uid, isi)
        }

        binding.btnLogout.setOnClickListener {
            auth.signOut()
            goToLogin()
        }
    }

    private fun tampilkanDataUser(uid: String) {
        db.collection("users").document(uid).get()
            .addOnSuccessListener { document ->
                val nama = document.getString("nama")
                    ?: auth.currentUser?.displayName
                    ?: "User"
                binding.tvWelcome.text = "Selamat datang, $nama!"
                binding.tvEmail.text = auth.currentUser?.email ?: ""
            }
    }

    private fun simpanCatatan(userId: String, isi: String) {
        val data = hashMapOf(
            "userId" to userId,
            "isiCatatan" to isi
        )
        db.collection("notes").add(data)
            .addOnSuccessListener {
                binding.etCatatan.setText("")
                Toast.makeText(this, "Catatan disimpan!", Toast.LENGTH_SHORT).show()
            }
            .addOnFailureListener { e ->
                Toast.makeText(this, "Gagal: \${e.message}", Toast.LENGTH_SHORT).show()
            }
    }

    private fun loadNotes(userId: String) {
        db.collection("notes")
            .whereEqualTo("userId", userId)
            .addSnapshotListener { snapshots, error ->
                if (error != null) return@addSnapshotListener
                notesList.clear()
                snapshots?.forEach { doc ->
                    notesList.add(
                        Note(
                            id = doc.id,
                            userId = doc.getString("userId") ?: "",
                            isiCatatan = doc.getString("isiCatatan") ?: ""
                        )
                    )
                }
                noteAdapter.notifyDataSetChanged()
            }
    }

    private fun goToLogin() {
        startActivity(Intent(this, LoginActivity::class.java))
        finish()
    }

        pref.edit().clear().apply()

        private const val PREF_NAME = "data_pref"
        private const val DATA_NIM = "nim"
        private const val DATA_NAMA = "nama"
    }

import java.lang.Exception

class StorageSpecific : StorageMahasiswaInterface {

    private var context: Context

    constructor(context: Context) {
        this.context = context
    }

    override fun saveMahasiswa(mahasiswa: Mahasiswa) {
        val data = "\${mahasiswa.nim} \${mahasiswa.nama}"
        context.openFileOutput(FILE_NAME, Context.MODE_PRIVATE).use {
            it.write(data.toByteArray())
        }
    }

    override fun getMahasiswa(): Mahasiswa {
        try {
            val text = context.openFileInput(FILE_NAME).bufferedReader().useLines { lines ->
                lines.fold("") { some, text ->
                    "$text"
                }
            }
            val res = text?.split(" ")

            return Mahasiswa(
                nim = res!!.get(0),
                nama = res!!.get(1)
            )

        } catch (e: Exception) {
            print(e.toString())
            return Mahasiswa()
        }
    }

    override fun deleteMahasiswa() {
        context.deleteFile(FILE_NAME)
    }

    companion object {
        val FILE_NAME = "file_data"
    }

class StorageSQLite : StorageMahasiswaInterface {
    private var dbHelper: SQLiteOpenHelper

    constructor(context: Context) {
        dbHelper = MahasiswaDBHelper(context)
    }

    override fun saveMahasiswa(mahasiswa: Mahasiswa) {
        val db = dbHelper.writableDatabase

        val values = ContentValues().apply {
            put(MyDB.TableMahasiswa.COLUMN_NIM, mahasiswa.nim)
            put(MyDB.TableMahasiswa.COLUMN_NAMA, mahasiswa.nama)
        }

        db?.insert(MyDB.TableMahasiswa.TABLE_NAME, null, values)
    }

    override fun getMahasiswa(): Mahasiswa {
        val db = dbHelper.readableDatabase

        val projection = arrayOf(
            MyDB.TableMahasiswa.COLUMN_NIM,
            MyDB.TableMahasiswa.COLUMN_NAMA
        )

        val sortOrder = "\${MyDB.TableMahasiswa.COLUMN_NIM} DESC"

        val cursor = db.query(
            MyDB.TableMahasiswa.TABLE_NAME,
            projection,
            null,   // selection (WHERE clause)
            null,   // selectionArgs
            null,   // groupBy
            null,   // having
            sortOrder
        )

        var nim = ""
        var nama = ""
        with(cursor) {
            while (moveToNext()) {
                nim = getString(getColumnIndexOrThrow(MyDB.TableMahasiswa.COLUMN_NIM))
                nama = getString(getColumnIndexOrThrow(MyDB.TableMahasiswa.COLUMN_NAMA))
            }
        }
        cursor.close()

        return Mahasiswa(nim, nama)
    }

    override fun deleteMahasiswa() {
        val db = dbHelper.writableDatabase
        db.delete(MyDB.TableMahasiswa.TABLE_NAME, null, null)
    }

        super.onCreate(savedInstanceState)
        binding = ActivityMainBinding.inflate(layoutInflater)
        setContentView(binding.root)

        // Ubah mode di sini untuk mencoba metode storage yang berbeda
        setMode(MODE_ROOM_DB)

            val nama = binding.etNama.text.toString()
            val mahasiswa = Mahasiswa(nim, nama)

        }

        binding.btnDelete.setOnClickListener {
            storage.deleteMahasiswa()
            showMahasiswa()
        }
    }

            binding.tvResult.text = "Belum ada data"

        binding.mode.text = "Mode: $mode"
